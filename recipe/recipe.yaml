schema_version: 1

context:
  name: mambular
  version: 1.7.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/basf/mamba-tabular/archive/v${{ version }}.tar.gz
  sha256: 05e582a8579005bda84cfa4610d320804f2615720333d44ef169a60d3aa77258

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
    - poetry-core
  run:
    - pretab >=0.0.1,<0.0.2
    - accelerate >=1.2.1,<2.0.0
    - einops >=0.8.0,<0.9.0
    - scikit-optimize >=0.10.2,<0.11.0
    - scipy >=1.15.0,<2.0.0
    - python >=${{ python_min }},<3.12.4a0
    - numpy >=2.0.0,<3.0.0
    - pandas >=2.0.3,<3.0.0
    - lightning >=2.3.3,<3.0.0
    - scikit-learn >=1.3.2,<2.0.0
    - pytorch >=2.2.2,<2.8.0
    - torchmetrics >=1.5.2,<2.0.0
    - setuptools >=75.3.0,<76.0.0
    - properscoring >=0.1.0,<0.2.0
tests:
  - python:
      imports:
        - mambular
      pip_check: true

      python_version: ${{ python_min }}.*
about:
  summary: A python package for tabular deep learning with mamba blocks.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/basf/mamba-tabular

extra:
  recipe-maintainers:
    - jan-janssen
